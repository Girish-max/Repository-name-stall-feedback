```html
<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Stall Feedback</title>

<style>

body{
font-family:Segoe UI;
background:#f4f6f9;
margin:0;
padding:20px;
}

.container{
max-width:420px;
margin:auto;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:20px;
}

label{
font-weight:600;
font-size:14px;
}

input, textarea{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:15px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

#stallName{
background:#e9ecef;
color:#555;
}

.smiley-container{
display:flex;
justify-content:space-between;
margin:15px 0;
}

.smiley{
font-size:38px;
cursor:pointer;
transition:0.2s;
}

.smiley:hover{
transform:scale(1.2);
}

.selected{
transform:scale(1.4);
}

button{
width:100%;
padding:14px;
font-size:16px;
background:#0078d4;
border:none;
color:white;
border-radius:10px;
cursor:pointer;
}

#result{
margin-top:18px;
font-size:16px;
font-weight:600;
text-align:center;
}

.success{
color:green;
}

.error{
color:red;
}

</style>

</head>

<body>

<div class="container">

<h2>Rate This Stall</h2>

<label>Stall Name</label>
<input id="stallName" readonly>

<label>Employee ID</label>
<input id="empId" placeholder="Enter Employee ID">

<label>How was your experience?</label>

<div class="smiley-container">
<span class="smiley" onclick="setRating(1)">😡</span>
<span class="smiley" onclick="setRating(2)">🙁</span>
<span class="smiley" onclick="setRating(3)">😐</span>
<span class="smiley" onclick="setRating(4)">🙂</span>
<span class="smiley" onclick="setRating(5)">😍</span>
</div>

<label>Additional Feedback</label>
<textarea id="comments" rows="3" placeholder="Type your feedback"></textarea>

<button onclick="submitFeedback()">Submit Feedback</button>

<div id="result"></div>

</div>

<script>

let rating = 0

// Auto populate stall name from QR
const params = new URLSearchParams(window.location.search)
const stall = params.get("stall")

if(!stall){
alert("Invalid QR Code")
}

document.getElementById("stallName").value = stall


function setRating(val){

rating = val

document.querySelectorAll(".smiley").forEach(s=>{
s.classList.remove("selected")
})

event.target.classList.add("selected")

}


async function submitFeedback(){

const empId = document.getElementById("empId").value.trim()
const comments = document.getElementById("comments").value
const stall = document.getElementById("stallName").value

if(!empId || rating === 0){

document.getElementById("result").innerHTML =
"<span class='error'>Enter Employee ID and select rating</span>"

return

}

try{

// CHECK DUPLICATE FEEDBACK

const dupResponse = await fetch(
"https://hpe.sharepoint.com/teams/hpebangalore/_api/web/lists/getbytitle('Feedback')/items?$filter=Title eq '"+empId+"' and StallName eq '"+stall+"'",
{
headers:{ "Accept":"application/json;odata=verbose"}
})

const dupData = await dupResponse.json()

if(dupData.d.results.length > 0){

document.getElementById("result").innerHTML =
"<span class='error'>You already submitted feedback for this stall</span>"

return

}


// GET EMPLOYEE NAME

let empName=""

const empResponse = await fetch(
"https://hpe.sharepoint.com/teams/hpebangalore/_api/web/lists/getbytitle('EmployeeMaster')/items?$filter=Title eq '"+empId+"'",
{
headers:{ "Accept":"application/json;odata=verbose"}
})

const empData = await empResponse.json()

if(empData.d.results.length > 0){

empName = empData.d.results[0].EmployeeName

}


// SAVE FEEDBACK

await fetch(
"https://hpe.sharepoint.com/teams/hpebangalore/_api/web/lists/getbytitle('Feedback')/items",
{

method:"POST",

headers:{
"Accept":"application/json;odata=verbose",
"Content-Type":"application/json;odata=verbose",
"X-RequestDigest":document.getElementById("__REQUESTDIGEST").value
},

body:JSON.stringify({

__metadata:{ type:"SP.Data.FeedbackListItem" },

Title: empId,
EmployeeName: empName,
StallName: stall,
Rating: rating,
Comments: comments

})

})


// SHOW SUCCESS MESSAGE

if(empName){

document.getElementById("result").innerHTML =
"<span class='success'>Thank you "+empName+" for your feedback</span>"

}else{

document.getElementById("result").innerHTML =
"<span class='success'>Thank you for your feedback</span>"

}


// RESET FORM

document.getElementById("empId").value=""
document.getElementById("comments").value=""

rating=0

document.querySelectorAll(".smiley").forEach(s=>{
s.classList.remove("selected")
})

}catch(e){

document.getElementById("result").innerHTML =
"<span class='error'>Error submitting feedback</span>"

}

}

</script>

</body>
</html>
