<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Stall Feedback</title>

<style>

body{
font-family:Segoe UI;
background:#f4f6f9;
margin:0;
padding:20px;
}

.container{
max-width:420px;
margin:auto;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
text-align:center;
}

h2{
text-align:center;
margin-bottom:20px;
}

label{
font-weight:600;
font-size:14px;
display:block;
text-align:left;
margin-left:5%;
}

input, textarea{

width:90%;
padding:10px;
margin-top:6px;
margin-bottom:15px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
box-sizing:border-box;
display:block;
margin-left:auto;
margin-right:auto;

}

#stallName{
background:#e9ecef;
color:#555;
}

.smiley-container{
display:flex;
justify-content:space-around;
margin:15px 0;
}

.smiley{
font-size:36px;
cursor:pointer;
transition:0.2s;
}

.smiley:hover{
transform:scale(1.2);
}

.selected{
transform:scale(1.4);
}

button{
width:90%;
padding:14px;
font-size:16px;
background:#0078d4;
border:none;
color:white;
border-radius:10px;
cursor:pointer;
}

#result{
margin-top:18px;
font-size:16px;
font-weight:600;
text-align:center;
}

.success{
color:green;
}

.error{
color:red;
}

@media (max-width:480px){

.container{
padding:20px;
}

.smiley{
font-size:34px;
}

}

</style>

</head>

<body>

<div class="container">

<h2>Rate This Stall</h2>

<label>Stall Name</label>
<input id="stallName" readonly>

<label>Employee ID</label>
<input id="empId" placeholder="Enter Employee ID" inputmode="numeric">

<label>How was your experience?</label>

<div class="smiley-container">

<span class="smiley" onclick="setRating(1)">😡</span>
<span class="smiley" onclick="setRating(2)">🙁</span>
<span class="smiley" onclick="setRating(3)">😐</span>
<span class="smiley" onclick="setRating(4)">🙂</span>
<span class="smiley" onclick="setRating(5)">😍</span>

</div>

<label>Additional Feedback</label>

<textarea id="comments" rows="3" placeholder="Type your feedback"></textarea>

<button onclick="submitFeedback()">Submit Feedback</button>

<div id="result"></div>

</div>

<script>

let rating = 0

// Get stall from QR parameter
const params = new URLSearchParams(window.location.search)
const stall = params.get("stall")

if(!stall){
alert("Invalid QR Code")
}

document.getElementById("stallName").value = decodeURIComponent(stall)

function setRating(val){

rating = val

document.querySelectorAll(".smiley").forEach(s=>{
s.classList.remove("selected")
})

event.target.classList.add("selected")

}


async function submitFeedback(){

const empId = document.getElementById("empId").value.trim()
const comments = document.getElementById("comments").value
const stall = document.getElementById("stallName").value

if(!empId || rating === 0){

document.getElementById("result").innerHTML =
"<span class='error'>Enter Employee ID and select rating</span>"

return
}

try{

const response = await fetch(
"https://default105b2061b6694b3192ac24d304d195.dc.environment.api.powerplatform.com/powerautomate/automations/direct/workflows/7aeb4583279d47d3852805fb1ec065d5/triggers/manual/paths/invoke?api-version=1",
{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

employeeId: empId,
stall: stall,
rating: rating,
comments: comments

})

})

const data = await response.json()

if(data.fullName){

document.getElementById("result").innerHTML =
"<span class='success'>Thank you "+data.fullName+" for your feedback</span>"

}else{

document.getElementById("result").innerHTML =
"<span class='success'>Thank you for your feedback</span>"

}

document.getElementById("empId").value=""
document.getElementById("comments").value=""
rating=0

document.querySelectorAll(".smiley").forEach(s=>{
s.classList.remove("selected")
})

}catch(error){

console.log(error)

document.getElementById("result").innerHTML =
"<span class='error'>Error submitting feedback</span>"

}

}

</script>

</body>
</html>
